# RAID monitoring for Broadcom/LSI MegaRAID

# Main metrics
UserParameter=raid.pdisk.status[*],/usr/local/lib/zabbix/scripts/raid_pdisk_status.sh $1
UserParameter=raid.vdisk.status[*],/usr/local/lib/zabbix/scripts/raid_vdisk_status.sh $1
UserParameter=raid.disk.health[*],/usr/local/lib/zabbix/scripts/raid_disk_health.sh $1

# Virtual disk counters
UserParameter=raid.vdisk.total.count[*],/usr/local/lib/zabbix/scripts/raid_vdisk_status.sh $1 | /usr/bin/jq 'length'
UserParameter=raid.vdisk.degraded.count[*],/usr/local/lib/zabbix/scripts/raid_vdisk_status.sh $1 | /usr/bin/jq '[.[] | select(.state != "Optl")] | length'

# Physical disk counters
UserParameter=raid.pdisk.total.count[*],/usr/local/lib/zabbix/scripts/raid_pdisk_status.sh $1 | /usr/bin/jq 'length'
UserParameter=raid.pdisk.failed.count[*],/usr/local/lib/zabbix/scripts/raid_pdisk_status.sh $1 | /usr/bin/jq '[.[] | select(.state | IN("Failed", "Offline"))] | length'
UserParameter=raid.pdisk.hotspare.count[*],/usr/local/lib/zabbix/scripts/raid_pdisk_status.sh $1 | /usr/bin/jq '[.[] | select(.state == "DHS")] | length'

# Disk health metrics
UserParameter=raid.disk.media.errors.sum[*],/usr/local/lib/zabbix/scripts/raid_disk_health.sh $1 | /usr/bin/jq '[.[].media_errors] | add // 0'
UserParameter=raid.disk.predictive.count[*],/usr/local/lib/zabbix/scripts/raid_disk_health.sh $1 | /usr/bin/jq '[.[] | select(.predictive_failure_count > 0)] | length'
UserParameter=raid.disk.smart.count[*],/usr/local/lib/zabbix/scripts/raid_disk_health.sh $1 | /usr/bin/jq '[.[] | select(.smart_alert == "Yes")] | length'
UserParameter=raid.disk.max.temperature[*],/usr/local/lib/zabbix/scripts/raid_disk_health.sh $1 | /usr/bin/jq '[.[].temperature] | max // 0'
UserParameter=raid.disk.avg.temperature[*],/usr/local/lib/zabbix/scripts/raid_disk_health.sh $1 | /usr/bin/jq '[.[].temperature] | add / length // 0'

# CacheVault/BBU status
UserParameter=raid.cvbbu.status.text[*],/usr/local/lib/zabbix/scripts/raid_cv-bbu_status.sh $1 | /usr/bin/jq -r '.status'
UserParameter=raid.cvbbu.temperature[*],/usr/local/lib/zabbix/scripts/raid_cv-bbu_status.sh $1 | /usr/bin/jq '.temperature // 0'
